<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Prepify</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h2>Login to Prepify</h2>

<form method="POST" action="{{ url_for('login') }}">
    <input
        type="email"
        name="email"
        placeholder="Email"
        required
    ><br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    ><br><br>

    <button type="submit">Login</button>
</form>

<br>

<p>
    Don’t have an account?
    <a href="{{ url_for('register') }}">Register</a>
</p>

</body>
</html>
